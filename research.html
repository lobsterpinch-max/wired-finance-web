<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wired Finance | Research Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #8A9A5B;
        --accent: #F97316;
        --text: #3B4261;
        --background: #F8FAFC;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Inter', sans-serif;
        background-color: #F8FAFC;
        color: #3B4261;
        line-height: 1.6;
    }
    .nav-bar {
        @apply bg-white shadow-md;
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 1rem 0;
        display: flex;
        justify-items: center;
        align-items: center;
        padding: 1rem 1rem;
    }
    .nav-nav {
        display: flex;
        gap: 1rem;
    }
    .nav-text {
        color: #4A5D2D;
        text-decoration: none;
        font-weight: normal;
        transition: all 0.2s ease;
        text-decoration: none;
    }
    .nav-ghost::after{
        content:".";
    }
    .nav-text::after{
        content:". ";
    }
    .nav-text:hover{
        color:#8A9A5B;
    }
    .hero{
        background:radial-gradient(white,white,transparent);
        text-align:center;
        padding-top:50px;
    }
    .hero h1{
        font-size:36px;
        color:#8A9A5B;
        font-weight:bold;
        margin-top:20px;
    }
    .hero-sub{
        color:#6B7B86;
        margin-top:20px;
    }
    input{
        padding:10px;
        border-radius:5px;
        border:1px solid #ccc;
        text-align:center;
    }
    button{
        padding:10px 20px;
        border:none;
        border-radius:5px;
        background-color:#8A9A5B;
        color:#fff;
        cursor:pointer;
        font-weight:bold;
    }
    button:hover{
        opacity:0.9;
    }
    input{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
    }
</style>
</head>
<body>
<nav class="nav-bar">
<div class="nav-text">Wired Finance</div>
<a class="nav-nav">Research</a>
<a class="nav-nav">Advisory</a>
<a class="nav-nav">Newsletter</a>
</div>
<section class="hero">
    <h1>Research Terminal</section>
    <p>Access real-time market insights, macro analysis, and curated investment opportunities.</section>
</section>
</body>
</html>
